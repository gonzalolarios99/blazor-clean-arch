name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore src/BlazorCleanArch.sln
    
    - name: Build
      run: dotnet build src/BlazorCleanArch.sln --configuration Release --no-restore
    
    - name: Run tests (if any)
      run: dotnet test src/BlazorCleanArch.sln --configuration Release --no-build --verbosity normal
      continue-on-error: true
